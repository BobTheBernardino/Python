<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Fun Theme</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #92e5ea, #c6c4fa, #e8ee71, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: #08d136cc;
            padding: 40px 60px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 3em;
            color: #ff6f61;
            text-shadow: 2px 2px #ffd700;
        }

        p {
            font-size: 1.5em;
            color: #333;
        }

        .emoji {
            font-size: 2em;
        }
    </style>
</head>
<body>
<!-- navbar -->
 <div class="navbar">
    <a href="/">🏠 Home</a>
    <a href="about">ℹ️ About</a>
    <a href="contacts">📞 Contact</a>
</div>

<style>
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: linear-gradient(90deg, #ff6f61, #ffd700, #6a5acd);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 1000;
}

.navbar a {
    text-decoration: none;
    color: white;
    font-size: 1.2em;
    background: #ffffff33;
    padding: 10px 20px;
    border-radius: 20px;
}

.navbar a:hover {
    background: white;
    color: #ff6f61;
}
</style>
<!-- navbar -->
    <div class="container">
        <div class="emoji">🌈✨🎈</div>
        <h1>hello I am {{hname}}</h1>
        <p>Welcome to a fun and colorful page!</p>
        <div class="emoji">🦄🍭🎨</div>

            <br>
    <a href="/">🏠 Home</a>
    <a href="contacts">📞 Contact</a>
    <a href="about">ℹ️ About</a>
    </div>
</body>
</html>
